// ── MENU ──────────────────────────────────────────────────────
let openDrop=null;

function openMenu(e,itemId,dropId){
  e.stopPropagation(); e.preventDefault();
  if(openDrop===dropId){cm();return;}
  cm();
  const item=document.getElementById(itemId);
  const drop=document.getElementById(dropId);
  if(!item||!drop)return;
  const r=item.getBoundingClientRect();
  drop.style.left=r.left+'px';
  drop.style.top=r.bottom+'px';
  drop.classList.add('show');
  item.classList.add('open');
  openDrop=dropId;
}

function cm(){
  document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('open'));
  openDrop=null;
}

const menuPairs={mFile:'ddFile',mComm:'ddComm',mEdit:'ddEdit',mDevice:'ddDevice',mTools:'ddTools',mHelp:'ddHelp'};
document.querySelectorAll('.menu-item').forEach(item=>{
  item.addEventListener('mouseenter',()=>{
    if(openDrop&&menuPairs[item.id]&&menuPairs[item.id]!==openDrop){
      const fakeE={stopPropagation:()=>{},preventDefault:()=>{}};
      openMenu(fakeE,item.id,menuPairs[item.id]);
    }
  });
});
document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.menu-bar')&&!e.target.closest('.dropdown'))cm();
});

function selVessel(v){

}

  const vd=document.getElementById('viewDetail');

function openDetail(v){
  selVessel(v); curV=v;

  const vd=document.getElementById('viewDetail');

  if(vd)vd.classList.remove('hidden');

function showDTab(t){
  curDTab=t;
  const tabs={Overview:'tabOv',Logs:'tabLg',Parameters:'tabPr',Devices:'tabDv'};
  Object.entries(tabs).forEach(([name,id])=>{
    const el=document.getElementById(id);
    if(el)el.classList.toggle('hidden',name!==t);
  });
  document.querySelectorAll('.dtab').forEach((el,i)=>{
    el.classList.toggle('active',['Overview','Logs','Parameters','Devices'][i]===t);
  });
  if(t==='Logs')setTimeout(drawCharts,60);
  if(t==='Overview')setTimeout(()=>draw3D(sim[curV].vol/100,curV==='FlyAsh'),60);
}

// ── 3D CANVAS ─────────────────────────────────────────────────
function draw3D(fill,isFA){
  const cv=document.getElementById('c3d'); if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,bT=75,bB=H-55,bW=160,bH=bB-bT,hw=bW/2;
  ctx.fillStyle='#b8c8d8'; ctx.fillRect(0,0,W,H);
  ctx.beginPath(); ctx.moveTo(cx-hw,bT); ctx.lineTo(cx,bT-50); ctx.lineTo(cx+hw,bT); ctx.closePath();
  ctx.fillStyle='#90a8bc'; ctx.fill(); ctx.strokeStyle='#607888'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#445566'; ctx.fillRect(cx-8,bT-57,16,13);
  ctx.fillStyle='#667788'; ctx.fillRect(cx-4,bT-61,8,6);
  ctx.fillStyle='#80a8c8'; ctx.fillRect(cx-hw,bT,bW,bH);
  const fH=bH*fill,fT=bB-fH;
  const g=ctx.createLinearGradient(cx-hw,fT,cx+hw,bB);
  if(isFA){
    g.addColorStop(0,'rgba(30,80,200,0.85)');
    g.addColorStop(0.5,'rgba(70,130,255,0.9)');
    g.addColorStop(1,'rgba(20,60,180,0.95)');
  } else {
    g.addColorStop(0,'rgba(0,170,220,0.8)');
    g.addColorStop(0.4,'rgba(80,220,255,0.85)');
    g.addColorStop(1,'rgba(0,150,210,0.9)');
  }
  ctx.beginPath(); ctx.moveTo(cx-hw,fT);
  for(let x=cx-hw;x<=cx+hw;x+=6)ctx.lineTo(x,fT+Math.sin((x-cx)*0.1)*4);
  ctx.lineTo(cx+hw,bB); ctx.lineTo(cx-hw,bB); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#5888a8'; ctx.lineWidth=2; ctx.strokeRect(cx-hw,bT,bW,bH);
  ctx.beginPath(); ctx.moveTo(cx-hw,bB); ctx.lineTo(cx,bB+38); ctx.lineTo(cx+hw,bB); ctx.closePath();
  ctx.fillStyle='#6888a0'; ctx.fill(); ctx.stroke();
  ctx.fillStyle='#cc2222'; ctx.font='bold 13px sans-serif'; ctx.fillText('F',cx+hw+7,bT+12);
  ctx.fillStyle='#cc8800'; ctx.fillText('E',cx+hw+7,bB-4);
  if(fH>20){
    const hg=ctx.createLinearGradient(cx-hw,fT,cx+hw,fT+Math.min(fH*0.5,60));
    hg.addColorStop(0,'rgba(255,80,0,0)');
    hg.addColorStop(0.4,'rgba(255,200,0,0.2)');
    hg.addColorStop(0.75,'rgba(0,220,80,0.16)');
    hg.addColorStop(1,'rgba(0,80,255,0)');
    ctx.fillStyle=hg; ctx.fillRect(cx-hw,fT,bW,Math.min(fH*0.5,60));
  }
}

function drawMinimap(){
  const cv=document.getElementById('minimap'); if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.fillStyle='#1a2a3a'; ctx.fillRect(0,0,W,H);
  for(let x=0;x<W;x+=3)for(let y=0;y<H;y+=3){
    const dx=x-W/2,dy=y-H/2,r=Math.sqrt(dx*dx+dy*dy);
    const v=Math.cos(r*0.22)*0.5+0.5;
    ctx.fillStyle=`hsl(${v*240},75%,${28+v*38}%)`; ctx.fillRect(x,y,3,3);
  }
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.strokeRect(1,1,W-2,H-2);
}

// ── CHARTS ────────────────────────────────────────────────────
function drawCharts(){
  const t=['10:35','10:40','10:45','10:50','10:55'];
  drawLC('chAD',t,[4.1,4.0,4.15,4.08,4.02],'#2244cc',0,18,'[m]');
  drawLC('chVol',t,[75,75,75,80,80],'#2244cc',0,100,'[%]');
  drawLC('chSNR',t,[40,40,40,65,50],'#cc2222',0,100,'[dB]');
  drawLC('chTemp',t,[25,25,25,25,25],'#44aa44',-50,200,'[C]');
}

function drawLC(id,lbls,data,color,yMin,yMax,unit){
  const cv=document.getElementById(id); if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const p={t:10,r:8,b:36,l:38},cW=W-p.l-p.r,cH=H-p.t-p.b,yr=yMax-yMin,xs=cW/(lbls.length-1);
  ctx.clearRect(0,0,W,H); ctx.fillStyle='white'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<=5;i++){
    const y=p.t+cH-(i/5)*cH;
    ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(p.l+cW,y); ctx.stroke();
    ctx.fillStyle='#888'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    ctx.fillText((yMin+(i/5)*yr).toFixed(0),p.l-3,y+3);
  }
  ctx.fillStyle='#555'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  lbls.forEach((l,i)=>{
    const x=p.l+i*xs; ctx.fillText(l,x,H-5);
    ctx.strokeStyle='#eee'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,p.t); ctx.lineTo(x,p.t+cH); ctx.stroke();
  });
  ctx.fillStyle='#666'; ctx.font='9px sans-serif'; ctx.textAlign='left'; ctx.fillText(unit,1,14);
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round';
  ctx.beginPath();
  data.forEach((v,i)=>{const x=p.l+i*xs,y=p.t+cH-((v-yMin)/yr)*cH; i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();
  ctx.beginPath();
  data.forEach((v,i)=>{const x=p.l+i*xs,y=p.t+cH-((v-yMin)/yr)*cH; i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.lineTo(p.l+(data.length-1)*xs,p.t+cH); ctx.lineTo(p.l,p.t+cH); ctx.closePath();
  const ag=ctx.createLinearGradient(0,p.t,0,p.t+cH);
  ag.addColorStop(0,color+'44'); ag.addColorStop(1,color+'06');
  ctx.fillStyle=ag; ctx.fill();
}

function updateCards(){
  const c=sim.Coal, f=sim.FlyAsh;
  const s=id=>document.getElementById(id);
  if(s('cAvgD'))s('cAvgD').textContent=c.avgD+' m';
  if(s('cMaxD'))s('cMaxD').textContent=c.maxD+' m';
  if(s('cMinD'))s('cMinD').textContent=c.minD+' m';
  if(s('cVol')) s('cVol').textContent=c.vol+' %';
  if(s('cFill'))s('cFill').style.height=c.vol+'%';
  if(s('fAvgD'))s('fAvgD').textContent=f.avgD+' m';
  if(s('fMaxD'))s('fMaxD').textContent=f.maxD+' m';
  if(s('fMinD'))s('fMinD').textContent=f.minD+' m';
  if(s('fVol')) s('fVol').textContent=f.vol+' %';
  if(s('fFill'))s('fFill').style.height=f.vol+'%';
}

function wizNav(d){ wizStep=Math.max(1,Math.min(4,wizStep+d)); renderWiz(); }

function renderWiz(){
  const titleEl=document.getElementById('wizTitle');
  if(titleEl)titleEl.textContent=curV+' - Configuration Wizard';
  const back=document.getElementById('wizBack');
  const next=document.getElementById('wizNext');
  if(back){ back.disabled=wizStep===1; back.style.opacity=wizStep===1?'0.5':'1'; }
  if(next){
    if(wizStep===4){ next.textContent='Finish'; next.onclick=()=>{closeM('mWizard');toast('✓ Configuration saved');} }
    else{ next.textContent='Next ▶'; next.onclick=()=>wizNav(1); }
  }
  const s=[null,wiz1,wiz2,wiz3,wiz4];
  const wb=document.getElementById('wizBody');
  if(wb)wb.innerHTML='<div class="wiz-lay"><div class="wiz-left">'+s[wizStep]()+'</div><div class="wiz-right">'+wizPrev()+'</div></div>';
}

// ── TOAST ─────────────────────────────────────────────────────
let toastT=null;
function toast(msg){
  const el=document.getElementById('toastEl');
  if(!el)return;
  el.textContent=msg;
  el.classList.remove('hidden');
  clearTimeout(toastT);
  toastT=setTimeout(()=>{ if(el)el.classList.add('hidden'); },2800);
}

// ECHO CURVE SYSTEM

let echoAnalysisRunning = false;
let echoAnalysisTimer   = null;
let echoViewerState     = 'normal';
let echoActiveTab       = 'All Beams';

const echoBeams = [
  { name:'High',    color:'#cc0000', fuzzyColor:'#ff6666' },
  { name:'Medium',  color:'#00aa00', fuzzyColor:'#66cc66' },
  { name:'Low',     color:'#aaaa00', fuzzyColor:'#dddd00' },
  { name:'Dir 30',  color:'#0000cc', fuzzyColor:'#6666ff' },
  { name:'Dir 90',  color:'#222222', fuzzyColor:'#888888' },
  { name:'Dir 150', color:'#777777', fuzzyColor:'#aaaaaa' },
  { name:'Dir 210', color:'#aa00aa', fuzzyColor:'#ff66ff' },
  { name:'Dir 270', color:'#008888', fuzzyColor:'#00cccc' },
  { name:'Dir 330', color:'#aa6600', fuzzyColor:'#ffaa44' },
];

let echoBeamVisible = {};
echoBeams.forEach(b => echoBeamVisible[b.name] = true);

// ── Echo popup ────────────────────────────────────────────────
function startEchoAnalysis(){
  if(echoAnalysisRunning)return;
  echoAnalysisRunning=true;
  const now=new Date();
  const ts=now.toLocaleDateString('en-US')+' '+now.toLocaleTimeString('en-US');
  const st=document.getElementById('echoStatusText');
  const pw=document.getElementById('echoProgressWrap');
  if(st)st.innerHTML=`<strong>Server is performing Echo Curve analysis.</strong><br>Start time: ${ts}<br>Server Echo Curve - Single activation.`;
  if(pw)pw.style.display='block';
  let pct=0;
  echoAnalysisTimer=setInterval(()=>{
    pct+=Math.random()*8+4;
    if(pct>=100){
      pct=100;
      clearInterval(echoAnalysisTimer);
      echoAnalysisRunning=false;
    }
    const pb=document.getElementById('echoProgressBar');
    const pl=document.getElementById('echoProgressLabel');
    if(pb)pb.style.width=pct+'%';
    if(pl)pl.textContent='Site1:Vessel1_0 ('+Math.round(pct)+'%)';
  },300);
}

function stopEchoAnalysis(){
  if(echoAnalysisTimer)clearInterval(echoAnalysisTimer);
  echoAnalysisRunning=false;
  const st=document.getElementById('echoStatusText');
  const pw=document.getElementById('echoProgressWrap');
  if(st)st.textContent='Server Echo Curve analysis status: Stopped.';
  if(pw)pw.style.display='none';
}

function openEchoViewer(){
  closeM('mEcho');
  openM('mEchoViewer');
  echoActiveTab='All Beams';
  echoViewerState='normal';
  echoBeams.forEach(b=>echoBeamVisible[b.name]=true);
  // Reset rescan button
  const btn=document.getElementById('echoRescanBtn');
  if(btn)btn.style.display='none';
  setTimeout(()=>{
    buildEchoLegend();
    redrawEchoChart();
  },80);
}

// ── Echo viewer ───────────────────────────────────────────────
function setEchoTab(name,btn){
  echoActiveTab=name;
  document.querySelectorAll('.echo-tab').forEach(b=>b.classList.remove('active-tab'));
  if(btn)btn.classList.add('active-tab');
  redrawEchoChart();
}

function selectAllBeams(val){
  echoBeams.forEach(b=>echoBeamVisible[b.name]=val);
  buildEchoLegend();
  redrawEchoChart();
}

function toggleBeam(name,val){
  echoBeamVisible[name]=val;
  redrawEchoChart();
}

function buildEchoLegend(){
  const el=document.getElementById('echoLegend');
  if(!el)return;
  const showFuzzy=document.getElementById('showFuzzy')&&document.getElementById('showFuzzy').checked;
  let html='';
  echoBeams.forEach(b=>{
    const chk=echoBeamVisible[b.name]?'checked':'';
    html+=`<label style="display:flex;align-items:center;gap:4px;margin-bottom:3px;cursor:pointer;font-size:11px">
      <input type="checkbox" ${chk} onchange="toggleBeam('${b.name}',this.checked)">
      <span style="display:inline-block;width:18px;height:3px;background:${b.color};border-radius:2px"></span>
      ${b.name}
    </label>`;
  });
  if(showFuzzy){
    echoBeams.forEach(b=>{
      html+=`<label style="display:flex;align-items:center;gap:4px;margin-bottom:3px;cursor:pointer;font-size:11px">
        <input type="checkbox" checked>
        <span style="display:inline-block;width:18px;height:3px;background:${b.fuzzyColor};border-radius:2px"></span>
        Fuzzy:${b.name}
      </label>`;
    });
  }
  el.innerHTML=html;
}

function redrawEchoChart(){
  buildEchoLegend();
  const cv=document.getElementById('echoViewerChart');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const pad={t:10,r:10,b:35,l:65};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const afterScan=(echoViewerState==='after_scan');
  const xMax=180, yMax=170000;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='white'; ctx.fillRect(0,0,W,H);

  // Y grid and labels
  ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1;
  for(let y=0;y<=yMax;y+=20000){
    const py=pad.t+cH-(y/yMax)*cH;
    ctx.beginPath(); ctx.moveTo(pad.l,py); ctx.lineTo(pad.l+cW,py); ctx.stroke();
    ctx.fillStyle='#777'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    const lbl=y===0?'0':(y/1000).toFixed(0)+',000';
    ctx.fillText(lbl,pad.l-4,py+3);
  }

  // X grid and labels
  for(let x=0;x<=xMax;x+=20){
    const px=pad.l+(x/xMax)*cW;
    ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,pad.t); ctx.lineTo(px,pad.t+cH); ctx.stroke();
    ctx.fillStyle='#777'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(x,px,pad.t+cH+14);
  }

  // Axis label and border
  ctx.fillStyle='#555'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('[ft]',pad.l+cW/2,H-4);
  ctx.strokeStyle='#999'; ctx.lineWidth=1.5;
  ctx.strokeRect(pad.l,pad.t,cW,cH);

  // Clip to chart area
  ctx.save();
  ctx.beginPath();
  ctx.rect(pad.l,pad.t,cW,cH);
  ctx.clip();

  // Draw beams
  const visBeams=echoActiveTab==='All Beams'
    ? echoBeams.filter(b=>echoBeamVisible[b.name])
    : echoBeams.filter(b=>b.name===echoActiveTab);

  visBeams.forEach(beam=>drawBeamLine(ctx,beam,pad,cW,cH,xMax,yMax,afterScan));

  ctx.restore();

  // Caption below chart
  showEchoCaption();
}

function drawBeamLine(ctx,beam,pad,cW,cH,xMax,yMax,afterScan){
  const seed=beam.name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng=s=>{const x=Math.sin(s*9301+49297)*233280; return x-Math.floor(x);};
  const mainPeak=117;
  const falsePeak=65;
  const beamOffset=(seed%10)-5;

  for(let ft=0;ft<=xMax;ft+=0.3){
    const px=pad.l+(ft/xMax)*cW;
    let amp=rng(seed+ft*13)*1200; // noise floor

    // Main echo cluster — tall dense spikes like real software
    const d1=ft-(mainPeak+beamOffset*0.4);
    if(Math.abs(d1)<14){
      const spike=Math.max(0,160000-d1*d1*900);
      amp+=spike*(0.5+rng(seed+ft*3)*0.5);
      amp+=rng(seed+ft*7)*spike*0.4;
    }

    // Scatter spikes around main echo
    for(let p=0;p<8;p++){
      const sp=mainPeak+10+p*4+beamOffset*0.5;
      const d2=ft-sp;
      if(Math.abs(d2)<3){
        amp+=Math.max(0,60000-d2*d2*7000)*rng(seed+p*17+ft);
      }
    }

    // False echo — only before scan
    if(!afterScan){
      if(beam.name==='High'){
        const d3=ft-falsePeak;
        if(Math.abs(d3)<4){
          amp+=Math.max(0,90000-d3*d3*6000);
          amp+=rng(seed+ft*11)*30000;
        }
      } else {
        const d3=ft-(falsePeak+beamOffset*0.3);
        if(Math.abs(d3)<3){
          amp+=Math.max(0,15000-d3*d3*2000)*rng(seed+ft*5);
        }
      }
    }

    amp=Math.min(amp,yMax);
    if(amp<400)continue;

    const py=pad.t+cH-(amp/yMax)*cH;
    // Draw as vertical line from baseline — gives spiky dense look
    ctx.strokeStyle=beam.color;
    ctx.lineWidth=0.8;
    ctx.globalAlpha=0.75;
    ctx.beginPath();
    ctx.moveTo(px,pad.t+cH);
    ctx.lineTo(px,py);
    ctx.stroke();
  }
  ctx.globalAlpha=1.0;
}

function showEchoCaption(){
  const box=document.getElementById('echoCaptionBox');
  if(!box)return;
  const afterScan=(echoViewerState==='after_scan');
  box.style.display='block';
  if(afterScan){
    box.style.borderColor='#27ae60';
    box.style.background='rgba(240,255,240,0.97)';
    box.innerHTML=`<strong style="color:#27ae60">✓ False Echo Removed</strong><br>
      The false echo at ~65 ft has been mapped out. The cluster at <strong>~117 ft</strong> is the true material surface.
      Click <strong>Load from Vessel</strong> in the toolbar to update sensor readings.`;
  } else {
    box.style.borderColor='#2a6db5';
    box.style.background='rgba(255,255,255,0.97)';
    box.innerHTML=`<strong>📊 Reading this chart:</strong> Think of this as a silo on its side — sensor is at 0 ft.
      The spike cluster near <strong>117 ft</strong> is the true material surface.
      The <strong style="color:#cc0000">red spike near 65 ft</strong> is a <strong>false echo</strong> — use <em>Map out False Echoes</em> above to remove it.`;
  }
}

// ── False Echo Mapper ─────────────────────────────────────────
function openFalseEchoMapper(){
  const cb=document.getElementById('mapOutFE');
  if(cb&&cb.checked)openM('mFalseEchoMapper');
}

function closeFalseEchoMapper(){
  closeM('mFalseEchoMapper');
  const cb=document.getElementById('mapOutFE');
  if(cb)cb.checked=false;
  // Reset progress
  const pw=document.getElementById('femProgressWrap');
  const pb=document.getElementById('femProgressBar');
  const st=document.getElementById('femStatusText');
  if(pw)pw.style.display='none';
  if(pb)pb.style.width='0%';
  if(st)st.textContent='Scanning...';
}

function femToggleAll(allCb){
  document.querySelectorAll('.fem-cb').forEach(cb=>cb.checked=allCb.checked);
}

function startFalseEchoScan(){
  const pw=document.getElementById('femProgressWrap');
  const btn=document.getElementById('femStartBtn');
  const pb=document.getElementById('femProgressBar');
  const st=document.getElementById('femStatusText');
  if(pw)pw.style.display='block';
  if(btn)btn.disabled=true;
  let pct=0;
  const t=setInterval(()=>{
    pct+=Math.random()*12+5;
    if(pct>=100){
      pct=100;
      clearInterval(t);
      if(pb)pb.style.width='100%';
      if(st)st.textContent='✓ Scan complete. False echo mapped out.';
      if(btn)btn.disabled=false;
      setTimeout(()=>{
        closeFalseEchoMapper();
        // Show rescan button in viewer
        const rescanBtn=document.getElementById('echoRescanBtn');
        if(rescanBtn)rescanBtn.style.display='inline-block';
        toast('✓ Mapped out. Click "Run New Analysis" to see the updated chart.');
      },1500);
      return;
    }
    if(pb)pb.style.width=pct+'%';
    if(st)st.textContent='Scanning... '+Math.round(pct)+'%';
  },250);
}

function runRescan(){
  echoViewerState='after_scan';
  redrawEchoChart();
  const btn=document.getElementById('echoRescanBtn');
  if(btn)btn.style.display='none';
  toast('✓ Analysis complete — false echo removed');
}
