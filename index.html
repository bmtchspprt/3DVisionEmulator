<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D MultiVision - BinMaster</title>
</head>
<body>
<script>
fetch('index1.html').then(r=>r.text()).then(css=>{
  const s=document.createElement('style');
  s.textContent=css.replace(/<\/?style>/g,'');
  document.head.appendChild(s);
  return fetch('index2.html');
}).then(r=>r.text()).then(html=>{
  document.body.insertAdjacentHTML('afterbegin',html);
  return fetch('index3.html');
}).then(r=>r.text()).then(js=>{
  const s=document.createElement('script');
  s.textContent=js.replace(/<\/?script>/g,'');
  document.body.appendChild(s);
  return fetch('guide.js');
}).then(r=>r.text()).then(js=>{
  const s=document.createElement('script');
  s.textContent=js.replace(/<\/?script>/g,'');
  document.body.appendChild(s);
  // Fire init manually now that everything is loaded
  if(typeof renderTS === 'function') renderTS();
  if(typeof document.getElementById('tbLevel') !== 'undefined'){
    const tb = document.getElementById('tbLevel');
    if(tb) tb.classList.add('active');
  }
}).catch(e=>{
  document.body.innerHTML='<div style="padding:40px;color:red;font-family:sans-serif"><h2>Error loading files</h2><p>'+e.message+'</p></div>';
});
</script>
</body>
</html>
