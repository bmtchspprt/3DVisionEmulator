<!-- ECHO CURVE ANALYSIS POPUP -->
<div class="modal-bg hidden" id="mEcho">
  <div class="modal-win" style="width:560px">
    <div class="modal-tbar">Activate Echo Curve Analysis<button class="modal-x" onclick="closeM('mEcho')">✕</button></div>
    <div class="modal-body" style="padding:14px;display:flex;gap:14px">
      <!-- LEFT: tree -->
      <div style="width:160px;flex-shrink:0;border:1px solid #ccc;border-radius:4px;padding:8px;background:white;font-size:12px">
        <div style="display:flex;align-items:center;gap:4px;padding:3px 0"><input type="checkbox" checked><strong> Site1</strong></div>
        <div style="display:flex;align-items:center;gap:4px;padding:3px 0;padding-left:14px"><input type="checkbox" checked> Vessel1</div>
        <div style="display:flex;align-items:center;gap:4px;padding:3px 0;padding-left:28px"><input type="checkbox" checked> Vessel1_0 (0)</div>
      </div>
      <!-- RIGHT: status + controls -->
      <div style="flex:1;display:flex;flex-direction:column;gap:10px">
        <div id="echoStatusText" style="font-size:12px;color:#333;background:#f0f0f0;padding:8px;border-radius:4px;min-height:60px;line-height:1.6">
          Server Echo Curve analysis status: Not active.
        </div>
        <div id="echoProgressWrap" style="display:none">
          <div style="background:#ddd;border-radius:4px;height:18px;overflow:hidden">
            <div id="echoProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#2a6db5,#44aaff);transition:width 0.3s;border-radius:4px"></div>
          </div>
          <div id="echoProgressLabel" style="font-size:11px;color:#555;margin-top:3px;text-align:center"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;font-size:12px">
          <label>Type:</label>
          <select class="adv-sel" style="width:180px"><option>All Echoes Info</option><option>Primary Echo Only</option></select>
        </div>
        <div style="border:1px solid #ccc;border-radius:4px;padding:8px;background:#f8f8f8">
          <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:#333">Continuous Grades</div>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px">
            <input type="checkbox" id="echoContinuous"> Every (mins)
            <input type="number" style="width:48px;border:1px solid #bbb;padding:2px 4px;font-size:12px;border-radius:3px" value="5">
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px">
            <input type="checkbox" disabled> Duration (hours)
            <input type="number" style="width:48px;border:1px solid #bbb;padding:2px 4px;font-size:12px;border-radius:3px" value="0" disabled>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mbtn-p" onclick="openEchoViewer()">Open Viewer</button>
      <button class="mbtn-p" id="echoStartBtn" onclick="startEchoAnalysis()">Start</button>
      <button class="mbtn" id="echoStopBtn" onclick="stopEchoAnalysis()">Stop</button>
      <button class="mbtn" onclick="closeM('mEcho')">Close</button>
    </div>
  </div>
</div>

<!-- ECHO CURVE VIEWER -->
<div class="modal-bg hidden" id="mEchoViewer">
  <div class="modal-win" style="width:900px;max-height:95vh">
    <div class="modal-tbar">
      Echo Curve EGT Silos\403\
      <button class="modal-x" onclick="closeM('mEchoViewer')">✕</button>
    </div>
    <div class="modal-body" style="padding:0;display:flex;flex-direction:column">
      <!-- toolbar -->
      <div style="display:flex;align-items:center;gap:12px;padding:6px 10px;border-bottom:1px solid #ccc;background:#f5f5f5;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="showFuzzy" onchange="redrawEchoChart()"> Show Fuzzy
        </label>
        <button style="background:#cc2222;color:white;border:none;padding:2px 8px;font-size:11px;border-radius:2px;cursor:pointer">✕</button>
        <select style="border:1px solid #bbb;padding:2px 6px;font-size:12px;border-radius:3px" onchange="redrawEchoChart()">
          <option>ft</option><option>m</option>
        </select>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="mapOutFE" onchange="openFalseEchoMapper()"> Map out False Echoes
        </label>
        <div id="echoViewerCaption" style="margin-left:auto;font-size:11px;color:#1a5a9a;font-style:italic;max-width:320px;text-align:right"></div>
      </div>
      <!-- beam tabs -->
      <div style="display:flex;gap:2px;padding:4px 8px;background:#e8e8e8;border-bottom:1px solid #ccc;flex-wrap:wrap">
        <button class="echo-tab active-tab" onclick="setEchoTab('High',this)">High</button>
        <button class="echo-tab" onclick="setEchoTab('Medium',this)">Medium</button>
        <button class="echo-tab" onclick="setEchoTab('Low',this)">Low</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 30',this)">Dir 30</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 90',this)">Dir 90</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 150',this)">Dir 150</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 210',this)">Dir 210</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 270',this)">Dir 270</button>
        <button class="echo-tab" onclick="setEchoTab('Dir 330',this)">Dir 330</button>
        <button class="echo-tab active-tab" onclick="setEchoTab('All Beams',this)">All Beams</button>
      </div>
      <!-- chart + legend -->
      <div style="display:flex;flex:1;overflow:hidden">
        <div style="flex:1;padding:8px;overflow:hidden;position:relative">
          <div style="font-size:12px;font-weight:700;text-align:center;margin-bottom:4px;color:#333">Analyze</div>
          <div style="overflow-x:auto">
            <canvas id="echoViewerChart" width="640" height="340" style="cursor:crosshair" onclick="echoChartClick(event)"></canvas>
          </div>
          <!-- info caption overlay -->
          <div id="echoCaptionBox" style="display:none;position:absolute;bottom:30px;left:20px;background:rgba(255,255,255,0.95);border:2px solid #2a6db5;border-radius:6px;padding:8px 12px;font-size:11.5px;color:#1a2a4a;max-width:320px;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,0.2)"></div>
        </div>
        <!-- legend -->
        <div style="width:145px;flex-shrink:0;padding:8px;overflow-y:auto;border-left:1px solid #ddd;background:#fafafa;font-size:11px">
          <div id="echoLegend"></div>
          <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
            <button onclick="selectAllBeams(true)" style="background:#2a6db5;color:white;border:none;padding:4px 8px;border-radius:3px;cursor:pointer;font-size:11px">Select All</button>
            <button onclick="selectAllBeams(false)" style="background:#888;color:white;border:none;padding:4px 8px;border-radius:3px;cursor:pointer;font-size:11px">Unselect All</button>
          </div>
        </div>
      </div>
      <!-- scroll hint -->
      <div style="padding:4px 12px;background:#f0f0f0;border-top:1px solid #ddd;font-size:11px;color:#888;text-align:center">
        Scroll chart to zoom · Click to inspect · Use tabs to filter by beam
      </div>
    </div>
  </div>
</div>

<!-- FALSE ECHO MAPPER DIALOG -->
<div class="modal-bg hidden" id="mFalseEchoMapper">
  <div class="modal-win" style="width:420px">
    <div class="modal-tbar">False Echoes Mapping Vessel:Vessel1<button class="modal-x" onclick="closeFalseEchoMapper()">✕</button></div>
    <div class="modal-body" style="padding:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <label style="font-size:12px;color:#555;width:60px">Device:</label>
        <select style="flex:1;border:1px solid #bbb;padding:5px 8px;font-size:12px;border-radius:4px">
          <option>Vessel1_0 (0)</option>
        </select>
      </div>
      <div style="border:1px solid #ccc;border-radius:5px;padding:12px;background:#f9f9f9;display:flex;gap:16px">
        <!-- left fields -->
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:10px">False Echoes Mapping</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <label style="font-size:12px;color:#555;width:80px">Action Type:</label>
            <select style="flex:1;border:1px solid #bbb;padding:4px 6px;font-size:12px;border-radius:3px">
              <option>Scan</option><option>Map</option><option>Clear</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <label style="font-size:12px;color:#555;width:80px">From:</label>
            <input type="number" value="0" style="width:70px;border:1px solid #bbb;padding:4px 6px;font-size:12px;border-radius:3px">
            <span style="font-size:12px;color:#555">ft</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <label style="font-size:12px;color:#555;width:80px">To:</label>
            <input type="number" value="100" style="width:70px;border:1px solid #bbb;padding:4px 6px;font-size:12px;border-radius:3px">
            <span style="font-size:12px;color:#555">ft</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <label style="font-size:12px;color:#555;width:80px">Threshold:</label>
            <input type="text" value="-" style="width:70px;border:1px solid #bbb;padding:4px 6px;font-size:12px;border-radius:3px;background:#f0f0f0" readonly>
          </div>
        </div>
        <!-- right checkboxes -->
        <div style="display:flex;flex-direction:column;gap:5px;font-size:12px">
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="femAll" checked onchange="femToggleAll(this)"> All</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> High</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Medium</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Low</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 30</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 90</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 150</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 210</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 270</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" class="fem-cb" checked> Dir 330</label>
        </div>
      </div>
      <!-- scanning progress -->
      <div id="femProgressWrap" style="display:none;margin-top:12px">
        <div style="background:#ddd;border-radius:4px;height:16px;overflow:hidden">
          <div id="femProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#2a6db5,#44aaff);transition:width 0.4s;border-radius:4px"></div>
        </div>
        <div id="femStatusText" style="font-size:11px;color:#555;margin-top:4px;text-align:center">Scanning...</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mbtn-p" id="femStartBtn" onclick="startFalseEchoScan()">Start Scanning</button>
      <button class="mbtn" onclick="closeFalseEchoMapper()">Close</button>
    </div>
  </div>
</div>
